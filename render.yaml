services:
  - type: web
    name: maia-backend
    runtime: docker
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CHROMA_URL
        value: local
