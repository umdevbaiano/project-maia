services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: maia-mongodb
    restart: unless-stopped
    # Port 27017 NOT exposed externally — internal only via maia-network
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=vettalaw
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-maia}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - maia-network

  # ChromaDB Vector Store (RAG)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: maia-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - maia-network

  # FastAPI Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: maia-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-maia}:${MONGO_PASSWORD}@mongodb:27017
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - mongodb
      - chromadb
    volumes:
      - ./server:/app
    networks:
      - maia-network

    networks:
      - maia-network

  # React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: maia-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - maia-network
    depends_on:
      - backend

  # Redis para o DLP Proxy
  redis-dlp:
    image: redis:7.2-alpine
    container_name: maia-redis-dlp
    restart: unless-stopped
    networks:
      - maia-network

  # File Masker Sidecar (Tesseract/Python)
  file-masker:
    build:
      context: ./dlp-proxy/services/file-masker
      dockerfile: Dockerfile
    container_name: maia-file-masker
    restart: unless-stopped
    networks:
      - maia-network

  # Vetta Shield (Rust Proxy)
  vetta-shield:
    build:
      context: ./dlp-proxy
      dockerfile: Dockerfile
    container_name: vetta-shield-proxy
    restart: unless-stopped
    ports:
      - "8080:8080" # Proxy CONNECT
    depends_on:
      - redis-dlp
      - file-masker
    networks:
      - maia-network

networks:
  maia-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  chroma_data:
    driver: local
