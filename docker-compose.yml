services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: maia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=vettalaw
    networks:
      - maia-network

  # ChromaDB Vector Store (RAG)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: maia-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - maia-network

  # FastAPI Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: maia-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - mongodb
      - chromadb
    volumes:
      - ./server:/app
    networks:
      - maia-network

  # React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: maia-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - maia-network
    depends_on:
      - backend

networks:
  maia-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  chroma_data:
    driver: local
